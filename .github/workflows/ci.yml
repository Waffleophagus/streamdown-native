name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      PACKAGE_REGISTRY_URL: ${{ secrets.PACKAGE_REGISTRY_URL }}
      PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup npm auth for private registry
        if: env.PACKAGE_REGISTRY_TOKEN != ''
        run: |
          set -euo pipefail
          registry_url="${PACKAGE_REGISTRY_URL:-https://git.waffleophagus.com/api/packages/waffleophagus/npm/}"
          registry_host="${registry_url#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%/}"
          {
            echo "//${registry_host}/:_authToken=${PACKAGE_REGISTRY_TOKEN}"
            echo "@streamdown:registry=${registry_url}"
            echo "always-auth=true"
          } >> "${HOME}/.npmrc"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:packages:ci

      - name: Run tests
        run: pnpm run test

      - name: Check linting and formatting
        run: pnpm run check

      - name: Publish packages
        if: (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && env.PACKAGE_REGISTRY_TOKEN != ''
        run: node ./scripts/publish-packages.mjs
